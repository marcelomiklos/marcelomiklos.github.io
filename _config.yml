title: "Marcelo Miklos"
description: "Portfólio, blog e currículo de Marcelo Miklos"
url: "https://marcelomiklos.github.io"
baseurl: ""
lang: "pt-BR"

permalink: /blog/:year/:month/:day/:title/

collections:
  loja:
    output: true
    permalink: /loja/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "loja"
    values:
      layout: "item"
  - scope:
      path: "pt"
      type: "pages"
    values:
      layout: "page"
      lang: "pt"
  - scope:
      path: "en"
      type: "pages"
    values:
      layout: "page"
      lang: "en"

# Redes sociais
social:
  github: "marcelomiklos"
  linkedin: "marcelo-miklos"
  twitter: ""
  instagram: ""
  whatsapp: "5511981217965"
  email: "marcelo_miklos@hotmail.com"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
